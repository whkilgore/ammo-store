<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>

body{
font-family:Arial;
background:#0f1115;
color:white;
text-align:center;
margin:0;
}

.header{
background:black;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
width:500px;
margin:auto;
margin-top:40px;
}

.box{
background:#1c1f26;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.5);
text-align:left;
}

.total{
font-size:22px;
color:#00ff9d;
font-weight:bold;
}

button{
background:red;
color:white;
padding:14px 30px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:20px;
width:100%;
}

button:hover{
background:#c40000;
}

</style>

</head>

<body>

<div class="header">
Secure Checkout
</div>

<div class="container">

<div class="box">

<h2>Order Summary</h2>

<p>Federal Champion FMJ 9mm 500 Round Pack</p>

<hr>

<p>Subtotal: $19.99</p>
<p>Shipping: $9.95</p>
<p>Sales Tax (8.25%): $1.65</p>

<hr>

<p class="total">Order Total: $31.59</p>

<button onclick="alert('Processing payment...')">
PLACE ORDER
</button>

</div>

</div>

</body>
</html>
